spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
security.jwt.secret=test-secret-key-test-secret-key-test-secret-key
security.jwt.expiration-ms=86400000
cloudflare.r2.access-key=test-access-key
cloudflare.r2.secret-key=test-secret-key
cloudflare.r2.endpoint=http://localhost:9000
cloudflare.r2.bucket-name=test-bucket
cloudflare.r2.public-url=http://localhost:9000/test-bucket
logging.level.com.smarthireai=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
